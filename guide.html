# 웹기반 AI 플래너 — 팀 프로젝트 가이드

> KDT WebAI Team Planner · 2026.04 · v1.0

## 한 줄 요약

**"1년의 흐름부터 10분의 집중까지, 함께 채우는 AI 플래너."**

연력의 큰 그림과 10분 플래너의 미시적 실행을 한 앱에서 잇고, 그 사이의 번거로움을 AI가 거드는 모바일 우선 웹앱.

핵심 메시지 3개:
- 🗓 **연력으로 1년 한눈에** — 형광펜으로 큰 흐름과 기간을 그린다
- ⏱️ **10분 플래너로 오늘 깊이** — 시간 사용을 색칠로 분석한다
- ✨ **AI는 거드는 손길** — 일정 추가·목표 분해·주간 회고를 도와준다 (주도권은 사용자에게)

---SPLIT---

## 1. 프로젝트 개요

### 1.1 배경
- 시중 디지털 플래너는 대부분 **월·주·일 단위에 갇혀 있다.** 1년의 큰 흐름을 한 화면에서 보거나, 하루를 10분 단위로 쪼개어 분석하는 도구는 드물다.
- 반면 한국에서 사랑받아 온 종이 다이어리(굳이어플·모트모트 등)는 **연 → 월 → 주 → 일 → 10분**으로 시간을 점점 잘게 쪼개는 "줌인" 구조를 갖고 있다. 이 사상이 디지털에 제대로 옮겨진 사례는 거의 없다.
- 우리는 이 종이 다이어리의 시간관을 디지털로 살리되, **연력의 큰 그림 그리기**와 **10분 플래너의 세밀한 실행 추적**이라는 양 끝을 함께 제공하는 것을 코어로 잡는다.
- 다만 이 둘을 일일이 연결하고 채우는 일은 손이 많이 간다. **AI는 이 흐름의 빈틈을 메우는 보조 도구**로 자리한다 — 자연어로 일정 추가, 목표 분해 도움, 주간 회고 정리. 결정과 입력의 주도권은 사용자에게 있다.

### 1.2 타깃 사용자
- **1차**: 여행 계획·자기계발 목표를 가진 20–30대
- **2차**: 학습/공부 루틴을 짜는 학생, 직장인 회고 사용자

### 1.3 차별화 포인트

**시간 줌인 구조(연력 ↔ 10분)** 가 코어, **AI는 거드는 보조**라는 큰 원칙 아래 5가지로 정리.

| 구분 | 내용 |
|------|------|
| 🗓 **연력으로 1년을 한눈에** | 1년 365일을 한 화면에 펼쳐 형광펜으로 기간을 그린다. 큰 흐름·중요 시즌·휴가·프로젝트 마감을 즉시 시각화 — 시중 디지털 플래너에 거의 없는 뷰 |
| ⏱️ **10분 단위 시간 시각화** | 18시간 × 6칸(10분) = 108칸 그리드를 색칠해서 하루 시간 사용을 직관적으로 분석 |
| 🔗 **연력 ↔ 10분의 연결성** | 연력에 그은 형광펜 기간이 → 일력의 종일 띠로, 만다라트의 실행 셀이 → 일정으로. 같은 데이터가 6개 뷰에서 다르게 보임 |
| ✨ **AI 인사이트 인사말** | 앱을 켤 때마다 사용자 데이터를 바탕으로 한두 줄 코멘트 — "이번 주 운동 3회 채우셨어요. 한 번 더면 목표 달성!" 같은 격려·요약·환기 |
| 🤝 **AI는 거드는 손길** | 자연어 일정 추가, 만다라트 분해 도움, 주간 회고 정리. 단 결정과 입력 주도권은 사용자에게. AI 결과는 항상 미리보기 → 승인 |

### 1.4 일정 (4~5일 스프린트)

| Day | 작업 |
|-----|------|
| D1 | 환경 셋업 · 기존 Figma Make 코드 가져오기 · 라우팅 |
| D2 | AI 자연어 입력 → 일정 자동 추가 MVP |
| D3 | AI 만다라트 자동 분해 + 회고 요약 |
| D4 | 공유 링크(Firebase) · UI 다듬기 · 모바일 반응형 |
| D5 | 데모 시나리오 · 발표자료 · 배포(Vercel) |

## 2. 핵심 기능 명세

### 2.1 6가지 뷰

| 뷰 | 용도 | 핵심 인터랙션 |
|----|------|----------------|
| **연력** (Year) | 1년 전체 · 형광펜 기간 표시 | 드래그로 기간 선택 → 색·라벨 부여 |
| **달력** (Month) | 월간 일정 한눈에 | 셀 탭 → 일력으로 이동 |
| **주력** (Week) | 주간 시간표 | 빈 슬롯 탭 → 빠른 추가 |
| **일력** (Day) | 30분 단위 타임그리드 + 할일 | 드래그로 시간대 선택 |
| **10분 플래너** | 18×6 그리드 색칠로 시간 분석 | 작업 선택 → 셀 드래그 페인팅 |
| **만다라트** | 9×9 목표 분해 | 중심 목표 → AI 분해 → 셀 편집 |
| **일기** | 날짜별 텍스트 일기 | 자동 저장 |

### 2.2 AI 차별화 기능

| 기능 | 설명 | 예시 입력 |
|------|------|-----------|
| **자연어 → 일정 분해** | 자유 텍스트 → 다중 일정 생성 | "제주 3박 4일, 첫째 날 한라산" |
| **만다라트 자동 분해** | 핵심 목표 → 8 세부 + 64 실행 | "영어 회화 마스터" |

| **할일 패턴 분석** | 자주 미루는 항목 감지 → 재배치 | "3주째 미뤄짐, 시간 옮길까요?" |

## 4. AI · 인공지능 스택

> 우리 프로젝트의 **AI 보조 기능**을 구현하기 위한 모든 기술을 한 곳에 정리한 섹션.
> 사용자의 주도권을 해치지 않는 선에서 — 자연어 입력, 목표 분해, 회고 코칭, 패턴 감지를 담당.

### 4.1 모델 (LLM Provider)

> **비용 최적화를 위해 OpenAI gpt-4o-mini 단일 모델로 운영한다.**
> SDK·인증·프롬프트 관리가 한 곳으로 모이고, 학생 프로젝트 비용 한도 안에서 모든 기능 구현 가능.

| 모델 | 용도 | 선정 이유 |
|------|------|-----------|
| **OpenAI gpt-4o-mini** | 모든 LLM 작업 — 인사이트 인사말, 자연어 일정 추가, 만다라트 분해, 주간 회고, 일기 무드 태깅, 형광펜 라벨 제안 | 입력 $0.15 / 출력 $0.60 per 1M tokens 저비용 · Function Calling / Structured Output / Streaming 지원 · 한국어 안정 · 응답 빠름 (1~3초) |
| **text-embedding-3-small** (선택) | 패턴 감지용 임베딩 | 과거 todo·event 의미 검색. v2 도입 검토 |

> **모델 단일화 트레이드오프**
> - 장점: 토큰 1개로 모든 기능 · 라이브러리 단일 · 디버깅 쉬움
> - 단점: 무거운 작업에서 더 큰 모델 대비 품질이 약할 수 있음
> - 대응: **프롬프트 엔지니어링 + Few-shot**으로 품질 끌어올림, 결과는 항상 사용자 미리보기로 보정

### 4.2 호출 방식 (API & SDK)

| 항목 | 기술 | 설명 |
|------|------|------|
| **공식 SDK** | openai (Node/TypeScript) | TypeScript 타입 지원 · 재시도 내장 · Function Calling/Structured Output 풍부 |
| **호출 위치** | 프론트 → Vercel Edge Functions | OPENAI_API_KEY를 환경 변수로만, 클라이언트 노출 X |
| **응답 검증** | Zod 스키마 | 응답이 구조를 어기면 즉시 재시도 |
| **재시도 정책** | 지수 백오프 3회 (1s→2s→4s) | 네트워크·rate limit 대응 |
| **캐싱** | localStorage + sessionStorage | 같은 입력 반복 호출 차단 |
| **시스템 프롬프트 단일화** | lib/ai/prompts.ts 한 파일 | 동일 시스템 프롬프트 재사용 → 응답 일관성 + 디버깅 용이 |

### 4.3 적용 기법 (LLM Techniques)

각 기법이 **이 앱에서 구체적으로 어떤 역할**을 하고, **사용자에게 어떤 경험**을 만드는지 함께 정리.

| 기법 | 적용 기능 | 앱에서의 역할 | 사용자 효과 |
|------|-----------|--------------|--------------|
| **Function Calling / Tool Use** | 자연어 → 일정 추가 | LLM의 출력을 우리 store 함수(addEvent) 호출로 직접 매핑. LLM이 텍스트가 아니라 **앱 액션을 실행**하게 만든다. | "다음 주 화요일 두 시 미팅" 한 줄로 일력에 정확한 카드가 꽂힌다 |
| **Structured Output (JSON Schema)** | 만다라트 81칸 자동 분해 | 응답이 정해진 스키마(center, subgoals, actions)를 반드시 따르도록 강제. 누락·오타 자동 거부. | "TOEIC 900점" 한 단어로 81칸이 빈틈없이 채워진다 |
| **Few-shot Prompting** | 만다라트 · 주간 회고 | 시스템 프롬프트에 좋은 예시 2~3개를 박아넣어 톤·구체성을 학습 | "공부하기"가 아니라 "주 3회 섀도잉 30분"처럼 실행 가능한 문장이 나온다 |
| **Chain-of-Thought** | 다중 일자 일정 분해 (여행 등) | "큰 흐름 → 각 일자 배치"로 단계 사고 지시. 일자 간 모순 방지. | "제주 3박 4일"이 첫째 날 공항→호텔→저녁, 마지막 날 체크아웃→공항으로 자연스럽게 잡힌다 |
| **Self-Consistency** | 만다라트 핵심 목표 정제 (선택) | 모호한 입력은 여러 번 분해 후 공통점 추출 → 가장 합의된 안 채택 | 똑같이 두 번 눌러도 결과가 크게 흔들리지 않아 신뢰감↑ |
| **Constrained Decoding** | 시간·날짜 형식 강제 | 토큰 출력을 정규식 안에서만 생성 | "오후 두 시반" → 14:30으로 항상 정확. 수정 안 해도 됨 |
| **Streaming** | 주간 회고 생성 UI · 인사이트 인사말 | 응답을 토큰 단위로 흘려 보여줌 | 5~8초 동안 빈 화면이 아니라 글이 타이핑되듯 떠올라 체감 대기 시간 절반↓ |
| **Context Summarization** | AI 인사이트 인사말 (앱 진입 시) | 최근 일정·todo·만다라트·일기 데이터를 짧은 컨텍스트로 압축 후 한두 줄 코멘트 생성. 매번 전체를 보내지 않아 비용·지연 최소화 | 앱을 열 때마다 "어제 못 끝낸 할일 2개, 오전에 정리할까요?" 같은 나만의 인사가 떠 있어 시작이 부드럽다 |

### 4.4 보조 알고리즘 (Non-LLM)

> "AI"라고 다 LLM은 아니다. 가벼운 처리는 규칙·간단 머신러닝으로 — 비용 0, 응답 즉시.

| 알고리즘 | 적용 기능 | 앱에서의 역할 | 사용자 효과 |
|----------|-----------|--------------|--------------|
| **Rule-based Heuristics** | 미완료 할일 자동 이전 | 어제 todo 중 done=false 항목을 오늘 목록 맨 위에 "이월" 라벨로 자동 추가 | 매일 아침 어제 못 끝낸 일이 오늘로 따라온다. 아무것도 안 해도 됨 |
| **임베딩 + 코사인 유사도** (선택) | 유사 일정·작업 추천 | 과거 입력을 벡터화 저장. 새 입력에 가장 가까운 항목의 색·시간대·분을 제안 | "헬스" 입력 시 평소 쓰던 색·시간(화/목 19:00, 60분)이 자동 채워진다 |
| **간단 통계 집계** | 10분 플래너 분석 · 주간 대시보드 | 작업별 셀 개수 × 10분 = 누적 시간. 카테고리 비율을 차트로 | 한 주 끝에 "공부 12h · 운동 3h · SNS 8h" 같은 객관적 사실이 즉시 보임 |
| **EMA (지수가중이동평균)** (선택) | 습관 점수 · 만다라트 진행도 | 최근 7일에 더 큰 가중치를 둔 점수. 옛 점수가 현재를 가리지 않게 | "운동 72점 (지난주 65)" 추세가 즉시 보여 동기부여 |
| **충돌 감지 규칙** | 일정 시간대 겹침 검사 | AI/사용자 추가 시 같은 시간 다른 이벤트와 겹치는지 즉시 검사 | 미팅 두 개를 같은 시간에 잡으면 빨간 줄로 알려준다 |

### 4.5 AI 기능 ↔ 적용 뷰 매핑

> 모든 AI 기능은 **gpt-4o-mini 단일 모델**로 동작. 각 위치에서 적용하는 **기법**이 다를 뿐.

| 위치 | AI가 거드는 것 | 적용 기법 |
|----|------------------|-----------|
| **앱 진입 (홈 상단)** | ✨ **AI 인사이트 인사말** — 사용자 데이터를 보고 한두 줄 격려·요약·환기 (예: "어제 못 끝낸 할일 2개, 오전에 정리해볼까요?" / "이번 주 운동 3회 채우셨어요!") | Context Summarization + Streaming |
| **연력** | 형광펜 라벨 자동 제안 | Few-shot Prompting |
| **달력 · 주력 · 일력** | 자연어로 일정 추가 | Function Calling (Tool Use) |
| **10분 플래너** | 작업 자동 카테고리 + 색상 제안 | Few-shot + Structured Output |
| **만다라트** | 핵심 목표 → 8 세부 + 64 실행 자동 분해 | Structured Output (JSON Schema) |
| **일기** | 무드 자동 태깅 · 한 주 감정 요약 | Few-shot Classification |
| **(주간) 회고** | 한 주 데이터 → 자연어 코멘트 + 다음 주 제안 | Chain-of-Thought + Streaming |

### 4.6 비용·성능 가드레일

- **단일 모델**: gpt-4o-mini — 입력 $0.15 / 출력 $0.60 per 1M tokens (한 번 호출 평균 0.001~0.005달러)
- **호출 빈도 예상**:
  - 인사이트 인사말: 앱 진입당 1회 (캐시되면 0회)
  - 자연어 일정 추가: 사용자 액션당 1회
  - 만다라트 분해: 드물게 (주 1~2회)
  - 주간 회고: 주 1회
- **캐싱 3단계**:
  1. 동일 입력 → localStorage 즉시 반환 (비용 0)
  2. 인사이트 → 1시간 이내 같은 데이터면 재사용
  3. 회고/만다라트 결과 → Firestore 7일 보관, 다시 보기 가능
- **레이트 리밋**: 사용자당 분당 5회, 일당 50회 (예산 보호)
- **타임아웃**: 12초 — 초과 시 "다시 시도" 버튼
- **토큰 절약**: 인사이트 입력은 최근 7일만 요약, max_tokens 명시 (인사이트 80, 회고 400 등)
- **장애 대응**: 호출 실패 시 친절한 에러 + 수동 입력 폴백 (인사이트는 정적 메시지로)

### 4.7 프롬프트 거버넌스

- 모든 시스템 프롬프트는 lib/ai/prompts.ts 한 곳에 모음
- 각 프롬프트마다 **버전 태그** 부여 (mandala_v1, events_v2)
- A/B 테스트 결과를 README에 누적 기록
- 한국어 출력만 허용 (영어 섞임 방지)
- **AI는 결과를 직접 저장하지 않는다 — 항상 사용자 미리보기 → 승인 필수**

## 5. 작업 파이프라인

> **아이디어 → 차별화 → 디자인 → 프론트엔드 → 백엔드/DB → 배포 → 시연** 까지의 전체 흐름.
> 각 단계마다 목적·산출물·도구·체크포인트를 정의하고, 4~5일 스프린트 안에서 1~3은 압축, 4~7은 병렬로 진행한다.

### 5.1 단계별 흐름 (한눈에)

```
[1] 아이디어 수립
       ↓ (문제 정의 · 사용자 가설)
[2] 차별화 전략 수립
       ↓ (코어 5개 + AI 보조 원칙)
[3] 디자인 (UX → UI)
       ↓ (Figma Make 베이스 + 토큰)
[4] 프론트엔드 개발  ┐
                    │ (병렬)
[5] 백엔드 / DB     ┤
                    │
[6] AI 통합          ┘
       ↓
[7] 통합 · QA · 최적화
       ↓
[8] 배포
       ↓
[9] 시연 · 발표 · 회고
```

### 5.2 단계별 상세

#### 1단계 — 아이디어 수립
- **목적**: 누구의 어떤 불편을 해결할 것인가를 한 문장으로
- **활동**: 시중 플래너 비교(굳이어플·모트모트·구글캘린더·Notion), 종이 다이어리의 시간 줌인 구조 발견, 타깃 가설 수립
- **산출물**: 한 줄 요약, 타깃 정의
- **도구**: Notion · 화이트보드 · 사용자 인터뷰
- **체크포인트**: 한 문장으로 컨셉 설명 가능? 차별점 있음?

#### 2단계 — 차별화 전략 수립
- **목적**: 코어 자산(연력·10분) vs 보조 도구(AI) 분리. AI는 거드는 보조 원칙 합의
- **활동**: 5가지 차별화 도출, AI 인사이트 인사말 컨셉 확정, 시연 시나리오 초안
- **산출물**: §1.3 차별화 5개 / §3.5 AI 스택 / 시연 시나리오 초안
- **도구**: PROJECT_GUIDE.md, 회의록
- **체크포인트**: "왜 우리 앱이 필요한가"에 30초 안에 답?

#### 3단계 — 디자인 (UX → UI)
- **목적**: 머릿속 컨셉을 검증할 화면으로 만들기
- **활동**:

- **목적**: 사용자 식별 + 개인 데이터 영속 + 공유 링크 + AI 키 보관소

  - **5-6 공유 링크**: 읽기 전용 스냅샷 → shares/{shareId}, QR 코드

- **산출물**: User 모델, 로그인/회원가입/탈퇴 화면, Firestore 스키마, firestore.rules, /api/* 4개, .env.local

### 5.3 일정 매핑 (4~5일 스프린트)

| Day | 단계 | 주요 작업 |

### 5.4 단계 간 의존성 & 위험 신호

- **3단계 24h 이상 지연** → 4단계는 Figma Make 출력본으로 시작, 다듬기는 D4로
- **5단계 막힘** → 공유 링크는 v2로 미루고 localStorage 단독 운영
- **6단계 막힘** → 인사이트는 정적 메시지로 폴백, AI 기능 비활성화 토글
- **8단계 막힘** → 발표 PC에서 로컬 npm run dev 직접 시연

> **원칙**: AI가 모두 빠져도 코어(연력·10분·연결성)는 살아남는다. 그래서 발표는 무조건 성립한다.

## 8. 데이터 모델

> 모든 도메인 데이터는 **사용자 단위(uid)로 격리**되어 Firestore에 저장된다.
> 비로그인 사용자는 동일한 구조를 localStorage에 보관하다가, 로그인 시 자동으로 Firestore와 머지된다.

### 8.1 사용자 모델 (User)

```
type User = {
  uid: string;                       // Firebase Auth UID (PK)
  provider: 'google' | 'email' | 'kakao';
  email: string;
  displayName: string;
  photoURL?: string;
  createdAt: number;                 // 가입 일시
  lastLoginAt: number;               // 마지막 접속
  preferences: {
    theme: 'light' | 'dark' | 'system';
    language: 'ko' | 'en';
    aiInsightEnabled: boolean;       // 인사이트 인사말 on/off
    weekStartsOn: 0 | 1;             // 0=일, 1=월
  };
  consent: {
    privacyAcceptedAt: number;
    aiDataUsageAcceptedAt?: number;
  };
};
```

### 8.2 도메인 데이터 (User 하위)

```
type Event = {
  id: string;
  date: string;            // 'YYYY-MM-DD'
  title: string;
  color: string;
  startTime?: string;
  endTime?: string;
  createdBy: string;       // uid
};

type Highlight = {
  id: string;
  startDate: string;
  endDate: string;
  color: string;
  label?: string;
};

type Todo = {
  id: string;
  text: string;
  done: boolean;
  rolledFrom?: string;
  rolledId?: string;
};

type MandalaCell = string;  // 81개

type Diary = {
  date: string;
  text: string;
  mood?: '😊' | '😐' | '😢';
};

type ShareLink = {
  id: string;
  ownerUid: string;
  scope: 'day' | 'week' | 'mandala';
  payload: any;
  expiresAt?: number;
};
```

### 8.3 Firestore 컬렉션 구조

```
firestore/
├─ users/{uid}                    # User 프로필
│   ├─ events/{eventId}           # Event[]
│   ├─ todos/{date}               # Todo[]
│   ├─ highlights/{highlightId}   # Highlight[]
│   ├─ mandala/{mandalaId}        # MandalaCell[81]
│   └─ diaries/{date}             # Diary
│
└─ shares/{shareId}               # 공유 스냅샷 (읽기 전용)
    └─ { ownerUid, scope, payload, expiresAt }
```

### 8.4 Security Rules (요지)

```
match /users/{uid}/{collection}/{docId} {
  allow read, write:
    if request.auth != null && request.auth.uid == uid;
}

match /shares/{shareId} {
  allow read: if true;            // 공유 링크는 누구나 읽기
  allow write:
    if request.auth.uid == resource.data.ownerUid;
}
```

### 8.5 비로그인 ↔ 로그인 데이터 머지

1. **비로그인 사용자**: 모든 데이터는 localStorage에만
2. **로그인 시**: localStorage 데이터를 Firestore에 업로드 (충돌 시 로컬 우선)
3. **로그아웃 시**: 캐시 비움, 새 게스트 세션 시작

## 9. AI 호출 흐름

자연어 입력 → 일정 추가 흐름:

```
[사용자]         [Frontend]    [Edge Function]    [OpenAI API]
   |                |               |                  |
   | "제주 3박4일"   |               |                  |
   |--------------->|               |                  |
   |                | idToken+text  |                  |
   |                |-------------->|                  |
   |                |               | 시스템프롬프트    |
   |                |               | + JSON Schema   |
   |                |               | + 사용자 텍스트   |
   |                |               |----------------->|
   |                |               |                  |
   |                |               |  tool_call:      |
   |                |               |  addEvents([..]) |
   |                |               |<-----------------|
   |                | JSON 결과     |                  |
   |                |<--------------| Zod 검증         |
   | [확인/수정 화면] |               |                  |
   |<---------------|               |                  |
   | "이대로 저장"   |                                  |
   |--------------->| store.addEvents() + Firestore   |
```

**핵심 포인트**:
- API 키는 Edge Function 환경변수에만 보관 (클라이언트 노출 X)
- idToken 검증으로 익명 호출 차단
- LLM 응답은 항상 Zod 검증 후 사용자 미리보기를 거쳐야 저장

### 시스템 프롬프트 예시

```
당신은 한국어 일정 분해 전문가입니다.
사용자 텍스트를 받아 addEvents() 함수를
정확한 JSON 인자로 호출하세요.

규칙:
1. 시작 날짜 미명시 시 오늘 + 1일 기본값.
2. "3박 4일"은 4일치 events.
3. 한 일자에 2~4개 활동(이동/식사/주요/휴식).
4. 시간은 09:00–22:00 사이.
5. 짧고 명확한 제목 (예: "한라산 등반").
```

> **핵심 원칙**: AI 결과는 항상 미리보기를 거친다. 바로 저장하지 않는다.

5. 공유 링크 생성 → QR로 부모님께 전송

1. 만다라트 진입 → "TOEIC 900점" 입력
2. ✨ AI 분해 → 81칸 자동 채움
3. 셀 탭해서 수정 가능
4. 실행 셀 하나를 일정으로 드래그 → 일력에 추가

### 시나리오 3 — 회고 (만족도 어필)
1. 일요일 "주간 회고" 자동 생성
2. AI: "운동 3회 완료, 독서 1회 — 다음 주 재배치 제안"
3. 사용자 확인 → 다음 주 일정 자동 조정

<script>
(function() {
  'use strict';

  // 매우 단순한 마크다운 렌더러 (외부 의존 0)
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderInline(s) {
    // 인라인 코드 placeholder
    var codes = [];
    s = s.replace(/`([^`]+)`/g, function(_, c) {
      codes.push(escapeHtml(c));
      return 'IC' + (codes.length - 1) + '';
    });
    // 링크
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // 굵게
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // 인라인 코드 복원
    s = s.replace(/IC(\d+)/g, function(_, i) {
      return '<code>' + codes[+i] + '</code>';
    });
    return s;
  }

  function renderMarkdown(src) {
    // 코드블록 추출
    var codeBlocks = [];
    src = src.replace(/```([\s\S]*?)```/g, function(_, code) {
      codeBlocks.push(escapeHtml(code.replace(/^\n/, '')));
      return 'CB' + (codeBlocks.length - 1) + '';
    });

    var lines = src.split('\n');
    var out = [];
    var i = 0;
    var inUl = false, inOl = false, inP = false, inBQ = false;

    function closeP() { if (inP) { out.push('</p>'); inP = false; } }
    function closeUl() { if (inUl) { out.push('</ul>'); inUl = false; } }
    function closeOl() { if (inOl) { out.push('</ol>'); inOl = false; } }
    function closeBQ() { if (inBQ) { out.push('</blockquote>'); inBQ = false; } }
    function closeAll() { closeP(); closeUl(); closeOl(); closeBQ(); }

    while (i < lines.length) {
      var line = lines[i];
      var t = line.trim();

      if (!t) { closeAll(); i++; continue; }

      // 코드블록 placeholder
      var cbm = t.match(/^CB(\d+)$/);
      if (cbm) {
        closeAll();
        out.push('<pre><code>' + codeBlocks[+cbm[1]] + '</code></pre>');
        i++; continue;
      }

      // 헤딩
      var hm = t.match(/^(#{1,6})\s+(.+)$/);
      if (hm) {
        closeAll();
        var lv = hm[1].length;
        out.push('<h' + lv + '>' + renderInline(hm[2]) + '</h' + lv + '>');
        i++; continue;
      }

      // hr
      if (/^---+$/.test(t)) {
        closeAll();
        out.push('<hr>');
        i++; continue;
      }

      // 인용문
      if (t.charAt(0) === '>') {
        closeP(); closeUl(); closeOl();
        if (!inBQ) { out.push('<blockquote>'); inBQ = true; }
        out.push('<p>' + renderInline(t.replace(/^>\s?/, '')) + '</p>');
        i++; continue;
      } else if (inBQ) {
        closeBQ();
      }

      // 표
      if (t.indexOf('|') >= 0 && i + 1 < lines.length && /^\s*\|?[\s|:\-]+\|?\s*$/.test(lines[i+1])) {
        closeAll();
        var headers = t.replace(/^\||\|$/g, '').split('|').map(function(s){return s.trim();});
        var th = '';
        for (var k = 0; k < headers.length; k++) th += '<th>' + renderInline(headers[k]) + '</th>';
        out.push('<table><thead><tr>' + th + '</tr></thead><tbody>');
        i += 2;
        while (i < lines.length && lines[i].trim().indexOf('|') >= 0) {
          var row = lines[i].trim().replace(/^\||\|$/g, '').split('|').map(function(s){return s.trim();});
          var tr = '';
          for (var m = 0; m < row.length; m++) tr += '<td>' + renderInline(row[m]) + '</td>';
          out.push('<tr>' + tr + '</tr>');
          i++;
        }
        out.push('</tbody></table>');
        continue;
      }

      // 리스트
      if (/^[-*+]\s+/.test(t)) {
        closeP(); closeOl();
        if (!inUl) { out.push('<ul>'); inUl = true; }
        out.push('<li>' + renderInline(t.replace(/^[-*+]\s+/, '')) + '</li>');
        i++; continue;
      }
      if (/^\d+\.\s+/.test(t)) {
        closeP(); closeUl();
        if (!inOl) { out.push('<ol>'); inOl = true; }
        out.push('<li>' + renderInline(t.replace(/^\d+\.\s+/, '')) + '</li>');
        i++; continue;
      }

      // 일반 문단
      closeUl(); closeOl();
      if (!inP) { out.push('<p>'); inP = true; }
      out.push(renderInline(line) + ' ');
      i++;
    }
    closeAll();
    return out.join('');
  }

  // ── 시작 ──
  document.addEventListener('DOMContentLoaded', function() {
    var book = document.getElementById('book');
    var src = document.getElementById('md-source').textContent;
    var sections = src.split('---SPLIT---');

    // 표지
    var coverHtml =
      '<section class="page cover" id="page-cover">' +
        '<span class="cover-stamp">Team Project · 2026</span>' +
        '<h1>웹기반 AI 플래너<br>팀 가이드라인</h1>' +
        '<p class="lead">"AI가 같이 짜주는 일정·목표·회고 통합 플래너"<br>' +
        'Figma Make 베이스 + 자연어 인터페이스 + 만다라트 자동 분해</p>' +
        '<div class="cover-meta">' +
          '<span>KDT WebAI</span>' +
          '<span id="todayCover"></span>' +
          '<span>v 1.0</span>' +
        '</div>' +
      '</section>';
    book.insertAdjacentHTML('beforeend', coverHtml);

    // 본문 페이지
    var today = new Date();
    var dateStr = today.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    var compact = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0');

    for (var s = 0; s < sections.length; s++) {
      var md = sections[s].trim();
      if (!md) continue;
      var pageNum = s + 1;
      var titleM = md.match(/^#{1,6}\s+(.+)$/m);
      var title = titleM ? titleM[1].replace(/^\d+\.\s*/, '') : 'Section';
      var html =
        '<section class="page" id="page-' + pageNum + '">' +
          '<div class="page-meta">' +
            '<span class="date">' + dateStr + '</span>' +
            '<span class="num">PAGE ' + String(pageNum).padStart(2,'0') + ' · ' + title + '</span>' +
          '</div>' +
          '<div class="md">' + renderMarkdown(md) + '</div>' +
        '</section>';
      book.insertAdjacentHTML('beforeend', html);
    }

    // 날짜 라벨
    document.getElementById('dateTag').textContent = compact;
    var todayCover = document.getElementById('todayCover');
    if (todayCover) todayCover.textContent = compact;

    // 요소 캐시
    var bookEl = book;
    var progressEl = document.getElementById('progress');
    var tocItems = document.querySelectorAll('.toc-item');
    var pages = document.querySelectorAll('.page');

    // 목차 클릭
    for (var ti = 0; ti < tocItems.length; ti++) {
      (function(item) {
        item.addEventListener('click', function() {
          var id = item.getAttribute('data-target');
          var target = document.getElementById(id);
          if (target) {
            bookEl.scrollTo({ top: target.offsetTop - 16, behavior: 'smooth' });
          }
          for (var k = 0; k < tocItems.length; k++) tocItems[k].classList.remove('active');
          item.classList.add('active');
          document.getElementById('sidebar').classList.remove('open');
        });
      })(tocItems[ti]);
    }

    // 스크롤 동기화
    bookEl.addEventListener('scroll', function() {
      var max = bookEl.scrollHeight - bookEl.clientHeight;
      var ratio = max > 0 ? bookEl.scrollTop / max : 0;
      progressEl.style.transform = 'scaleX(' + ratio + ')';

      var mid = bookEl.scrollTop + bookEl.clientHeight / 3;
      var activeIdx = 0;
      for (var p = 0; p < pages.length; p++) {
        if (pages[p].offsetTop <= mid) activeIdx = p;
      }
      var activeId = pages[activeIdx] ? pages[activeIdx].id : null;
      for (var k = 0; k < tocItems.length; k++) {
        if (tocItems[k].getAttribute('data-target') === activeId) {
          tocItems[k].classList.add('active');
        } else {
          tocItems[k].classList.remove('active');
        }
      }
    });

    // 이전/다음
    function currentIdx() {
      var mid = bookEl.scrollTop + bookEl.clientHeight / 3;
      var idx = 0;
      for (var p = 0; p < pages.length; p++) {
        if (pages[p].offsetTop <= mid) idx = p;
      }
      return idx;
    }
    document.getElementById('prevBtn').addEventListener('click', function() {
      var i = Math.max(0, currentIdx() - 1);
      bookEl.scrollTo({ top: pages[i].offsetTop - 16, behavior: 'smooth' });
    });
    document.getElementById('nextBtn').addEventListener('click', function() {
      var i = Math.min(pages.length - 1, currentIdx() + 1);
      bookEl.scrollTo({ top: pages[i].offsetTop - 16, behavior: 'smooth' });
    });

    // 다크모드
    var btn = document.getElementById('themeToggle');
    var icon = document.getElementById('themeIcon');
    var label = document.getElementById('themeLabel');
    var saved = localStorage.getItem('guide_theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      icon.textContent = '☀️';
      label.textContent = '라이트';
    }
    btn.addEventListener('click', function() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        icon.textContent = '🌙';
        label.textContent = '다크';
        localStorage.setItem('guide_theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        icon.textContent = '☀️';
        label.textContent = '라이트';
        localStorage.setItem('guide_theme', 'dark');
      }
    });

    // 모바일 햄버거
    var fab = document.getElementById('menuFab');
    if (fab) {
      fab.addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
      });
    }

    // 키보드
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown' || e.key === 'PageDown') {
        e.preventDefault();
        document.getElementById('nextBtn').click();
      } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        e.preventDefault();
        document.getElementById('prevBtn').click();
      }
    });
  });
})();
</script>
</body>
</html>
