<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Haru:on</title>

    <!-- 일반 favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- 테마 색 (브라우저 상단바) — 첫 로드 시 splash 검은 배경에 맞춤 -->
    <meta name="theme-color" content="#000000" />

    <!-- 첫 로드 시 흰 깜빡임 방지 — splash-mode 클래스가 있을 때만 검정 -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
      }
      html.splash-mode, html.splash-mode body, html.splash-mode #root {
        background: #000 !important;
      }
    </style>
    <script>
      // React 마운트 전부터 검은 배경 보장 (splash 단계에서만)
      document.documentElement.classList.add("splash-mode");
    </script>

    <!-- ──── iOS PWA 풀스크린 설정 ──── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Haru:on" />

    <!-- iOS 홈 화면 아이콘 (사파리가 우선 사용) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- 일반 웹 아이콘 -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
