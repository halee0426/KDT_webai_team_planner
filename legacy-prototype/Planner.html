<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플래너</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ── Apple Design Tokens (DESIGN-apple.md) ─────────────────── */
:root {
  /* Colors */
  --blue:        #0066cc;
  --blue-focus:  #0071e3;
  --ink:         #1d1d1f;
  --white:       #ffffff;
  --parchment:   #f5f5f7;
  --tile-dark:   #272729;
  --muted-48:    rgba(0,0,0,0.48);
  --border:      rgba(0,0,0,0.08);

  /* Fonts — Pretendard */
  --font-display: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-text:    "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body, #root {
  height: 100%;
  overflow: hidden;
}

/* ── Base — DO: 17px body, -0.374px tracking, 1.47 line-height */
body {
  font-family: var(--font-text);
  font-size: 17px;
  line-height: 1.47;
  letter-spacing: -0.374px;
  color: var(--ink);
  background: var(--parchment);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button, input, textarea, select { font-family: inherit; }

/* ── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.18);
  border-radius: 3px;
}

/* ── Global Nav — Pure Black, 44px ────────────────────────── */
.ap-global-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 44px;
  padding: 0 22px;
  background: #000000;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.ap-global-nav__logo {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: -0.374px;
}

.ap-global-nav__actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Sub-Nav — Parchment frosted glass, 52px ──────────────── */
.ap-sub-nav {
  height: 52px;
  padding: 0 22px;
  background: rgba(245,245,247,0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid rgba(60,60,67,0.14);
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
  z-index: 99;
}

/* ── Tab pills — 980px radius (DO: primary CTA grammar) ───── */
.ap-tab {
  padding: 5px 14px;
  border-radius: 980px;
  border: none;
  background: transparent;
  color: var(--ink);
  font-family: var(--font-text);
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  cursor: pointer;
  transition: background .18s, color .18s, transform .1s;
  white-space: nowrap;
  position: relative;
}
.ap-tab:active { transform: scale(0.95); }   /* DO: scale(0.95) active */
.ap-tab.active {
  color: #ffffff;
  font-weight: 600;
}

/* ── Date chip ─────────────────────────────────────────────── */
.ap-date-chip {
  margin-left: auto;
  text-align: right;
  line-height: 1.3;
  flex-shrink: 0;
}
.ap-date-chip__day {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.224px;
}
.ap-date-chip__dow {
  font-size: 11px;
  font-weight: 400;
  color: var(--muted-48);
  letter-spacing: -0.12px;
}

/* ── Theme dot buttons ─────────────────────────────────────── */
.ap-theme-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  transition: box-shadow .15s, transform .15s;
}
.ap-theme-dot:active { transform: scale(0.95); }

/* ── Badge ─────────────────────────────────────────────────── */
.ap-badge {
  position: absolute;
  top: 0; right: 0;
  background: #ff3b30;
  color: #fff;
  border-radius: 50%;
  width: 14px; height: 14px;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transform: translate(4px, -4px);
}

/* ── Layout root ────────────────────────────────────────────── */
#root { display: flex; flex-direction: column; }
.ap-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.ap-pane { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.ap-pane.active { display: flex; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="yearView.jsx"></script>
<script type="text/babel" src="otherViews.jsx"></script>

<script type="text/babel">
/* ── Tab definitions ─────────────────────────────────────── */
const TABS = [
  { id: 'year',      label: '연력'       },
  { id: 'month',     label: '달력'       },
  { id: 'week',      label: '주력'       },
  { id: 'day',       label: '일력'       },
  { id: 'tenmin',    label: '10분 플래너'  },
  { id: 'diary',     label: '일기'       },
];

/* ── App ─────────────────────────────────────────────────── */
function App() {
  const data  = useStore();
  const theme = THEMES[data.theme] || THEMES.blue;
  const [tab, setTab]             = React.useState('year');
  const [showSettings, setShowSettings] = React.useState(false);

  React.useEffect(() => {
    window.__switchTab = (t) => setTab(t);
    return () => { delete window.__switchTab; };
  }, []);

  const now = new Date();

  const activeTabStyle = {
    background: theme.primary,
    color: '#ffffff',
    fontWeight: 600,
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>

      {/* ─── Global Nav ────────────────────────────────────── */}
      <header className="ap-global-nav">
        <span className="ap-global-nav__logo">플래너</span>
        <div className="ap-global-nav__actions">
          <button onClick={() => setShowSettings(true)} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            color: '#ffffff', fontSize: 18, lineHeight: 1,
            padding: '4px 6px', borderRadius: 8,
            opacity: 0.85, transition: 'opacity .15s',
          }}
            onMouseEnter={e => e.currentTarget.style.opacity = '1'}
            onMouseLeave={e => e.currentTarget.style.opacity = '0.85'}
            title="설정"
          >⚙</button>
        </div>
      </header>

      {/* ─── Sub-Nav ────────────────────────────────────────── */}
      <nav className="ap-sub-nav">
        {TABS.map(t => {
          const active = tab === t.id;
          return (
            <button
              key={t.id}
              className={'ap-tab' + (active ? ' active' : '')}
              onClick={() => setTab(t.id)}
              style={active ? activeTabStyle : {}}
            >
              {t.label}
            </button>
          );
        })}
        <div className="ap-date-chip">
          <div className="ap-date-chip__day">
            {now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' })}
          </div>
          <div className="ap-date-chip__dow">
            {['일','월','화','수','목','금','토'][now.getDay()]}요일
          </div>
        </div>
      </nav>

      {/* ─── Content panes ─────────────────────────────────── */}
      <main className="ap-main">
        <div className={'ap-pane' + (tab === 'year'      ? ' active' : '')}><YearView /></div>
        <div className={'ap-pane' + (tab === 'month'     ? ' active' : '')}><MonthView /></div>
        <div className={'ap-pane' + (tab === 'week'      ? ' active' : '')}><WeekView /></div>
        <div className={'ap-pane' + (tab === 'day'       ? ' active' : '')}><DayView /></div>
        <div className={'ap-pane' + (tab === 'tenmin'    ? ' active' : '')}><TenMinutePlanner /></div>
        <div className={'ap-pane' + (tab === 'diary'     ? ' active' : '')}><DiaryView /></div>
      </main>

      {/* ─── 설정 패널 ─────────────────────────────────────── */}
      {showSettings && (
        <>
          <div onClick={() => setShowSettings(false)} style={{
            position:'fixed', inset:0, zIndex:300,
            background:'rgba(0,0,0,0.18)', backdropFilter:'blur(2px)',
          }} />
          <div style={{
            position:'fixed', top:0, right:0, bottom:0, width:300,
            background:'#ffffff', zIndex:301,
            boxShadow:'-8px 0 32px rgba(0,0,0,0.12)',
            display:'flex', flexDirection:'column',
          }}>
            {/* 패널 헤더 */}
            <div style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'18px 20px', borderBottom:'0.5px solid rgba(60,60,67,0.12)',
            }}>
              <span style={{ fontWeight:700, fontSize:17, letterSpacing:-0.3, color:'#1C1C1E' }}>설정</span>
              <button onClick={() => setShowSettings(false)} style={{
                background:'rgba(0,0,0,0.06)', border:'none', cursor:'pointer',
                width:28, height:28, borderRadius:'50%',
                fontSize:16, color:'#3C3C43', lineHeight:1,
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>×</button>
            </div>

            {/* 색상 테마 */}
            <div style={{ padding:'20px', overflowY:'auto', flex:1 }}>
              <div style={{ fontSize:11, fontWeight:600, color:'#8E8E93', letterSpacing:0.5,
                textTransform:'uppercase', marginBottom:14 }}>색상 테마</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10 }}>
                {Object.entries(THEMES).map(([key, t]) => {
                  const sel = data.theme === key;
                  return (
                    <button key={key} onClick={() => store.setTheme(key)} style={{
                      padding:'12px 8px', borderRadius:14, border:'none', cursor:'pointer',
                      background: sel ? t.primary+'18' : 'rgba(0,0,0,0.04)',
                      outline: sel ? `2px solid ${t.primary}` : '2px solid transparent',
                      outlineOffset: 0,
                      display:'flex', flexDirection:'column', alignItems:'center', gap:7,
                      transition:'all .15s',
                    }}>
                      <div style={{ width:26, height:26, borderRadius:'50%', background:t.primary,
                        boxShadow: sel ? `0 0 0 3px ${t.primary}30` : 'none' }} />
                      <span style={{ fontSize:11, fontWeight: sel ? 600 : 400,
                        color: sel ? t.primary : '#3C3C43', letterSpacing:-0.1 }}>{t.name}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
